<!DOCTYPE html>
<html lang="et" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CybAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="cybai-header py-3">
        <div class="container-fluid d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="text-decoration-none"><h1 class="mb-0 fw-bold text-white">Cyb<span class="text-info">AI</span></h1></a>
                <span class="text-uppercase text-muted small tracking-wide">Küberturvalisuse agent</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="badge bg-success">Süsteem online</span>
                <button id="scan-btn" class="btn btn-outline-info btn-sm" onclick="startScan()">Skanni kohe</button>
            </div>
        </div>
    </header>

    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-3 mt-auto">
        <p class="mb-0 text-muted small">CybAI &copy; 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
